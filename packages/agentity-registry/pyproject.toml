[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentity-registry"
version = "0.1.0"
description = "Agentity Protocol Registry — REST API for DID lookup, revocation, WebSocket, audit"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "redis>=5",
    "pydantic>=2",
    "httpx>=0.27",
    "cryptography>=42",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "ruff>=0.4",
]

[tool.ruff]
line-length = 120
target-version = "py311"
