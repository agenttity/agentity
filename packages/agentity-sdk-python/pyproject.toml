[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentity-sdk-python"
version = "0.1.1"
description = "Agentity Protocol Python SDK — identity, signer, LangChain integration"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "httpx>=0.27",
    "cryptography>=42",
    "pydantic>=2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "ruff>=0.4",
    "langchain>=0.2",
    "langchain-openai>=0.1",
]

readme = "README.md"

[project.urls]
Homepage = "https://github.com/agenttity/agentity"
Source = "https://github.com/agenttity/agentity"
Documentation = "https://github.com/agenttity/agentity/blob/main/packages/agentity-sdk-python/README.md"

[tool.ruff]
line-length = 120
target-version = "py311"
