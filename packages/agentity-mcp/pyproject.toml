[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentity-mcp"
version = "0.1.1"
description = "Agentity MCP protocol plugin for Anthropic"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "agentity-sdk-python>=0.1",
    "httpx>=0.27",
]

readme = "README.md"

[project.urls]
Homepage = "https://github.com/agenttity/agentity"
Source = "https://github.com/agenttity/agentity"

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.24"]

[tool.ruff]
line-length = 120
