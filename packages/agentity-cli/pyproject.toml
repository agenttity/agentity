[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentity-cli"
version = "0.1.1"
description = "Agentity CLI — create, inspect, revoke, verify, manifest"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "agentity-sdk-python>=0.1",
]
readme = "README.md"

[project.scripts]
agentity = "agentity_cli:main"

[project.urls]
Homepage = "https://github.com/agenttity/agentity"
Source = "https://github.com/agenttity/agentity"

[project.optional-dependencies]
dev = ["pytest>=8"]
