[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentity-auth"
version = "0.1.0"
description = "Agentity OIDC authentication — verify human owners via Google, GitHub, Apple, Microsoft"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "fastapi>=0.110",
    "authlib>=1.3",
    "httpx>=0.27",
    "pydantic>=2",
    "agentity-sdk-python>=0.1",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.24", "ruff>=0.4"]

[tool.ruff]
line-length = 120
target-version = "py311"
