[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentity-a2a"
version = "0.1.0"
description = "Agentity A2A protocol plugin for Google"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "agentity-sdk-python>=0.1",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.24"]
