[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentity-middleware-python"
version = "0.1.1"
description = "Agentity middleware for FastAPI"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "fastapi>=0.110",
    "agentity-sdk-python>=0.1",
    "cryptography>=42",
]

readme = "README.md"

[project.urls]
Homepage = "https://github.com/agenttity/agentity"
Source = "https://github.com/agenttity/agentity"

[tool.setuptools.packages.find]
where = ["."]

[project.optional-dependencies]
dev = ["pytest>=8", "httpx>=0.27"]
