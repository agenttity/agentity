name: Release
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --ignore-scripts
      - run: pnpm build
      - run: |
          cargo build --release --workspace
          pip install build
          python -m build packages/agentity-sdk-python
          python -m build packages/agentity-registry
          python -m build packages/agentity-middleware/python
          python -m build packages/agentity-mcp
          python -m build packages/agentity-a2a
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
